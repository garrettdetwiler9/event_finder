name: Deploy

# Railway's native GitHub integration handles deployment automatically
# when changes are pushed to main. No separate deploy step needed here.
# See: https://railway.app/project settings → Source → GitHub branch connection

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy-server:
    name: Deploy Server to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm deployment is handled by Railway
        run: echo "✅ Railway auto-deploys from the connected GitHub branch. No action needed here."
